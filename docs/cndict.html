<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mandarin Dictionary Aggregator — Phantom Tools</title>
  <meta content="Mandarin Dictionary Aggregator" property="og:title">
  <meta content="Search across multiple dictionaries simultaneously" property="og:description">
  <link rel="stylesheet" href="./cndictstyle.css">
  <link rel="icon" href="./assets/elysigicon.png" type="image/png">
  <style>
    .dict-header {
      padding: 20px 24px 16px;
    }

    .dict-header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      margin: 0 0 2px;
    }

    .dict-header .subtitle {
      color: var(--text-muted);
      font-size: 0.88rem;
      margin: 0 0 16px;
    }

    .dict-rows {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .dict-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .dict-row-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-muted);
      width: 60px;
      flex-shrink: 0;
    }

    .dict-input {
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      padding: 8px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s ease;
    }

    .dict-input:focus { border-color: var(--accent); }
    .dict-input[readonly] {
      background: var(--surface);
      color: var(--text-muted);
      cursor: default;
      font-size: 0.88rem;
    }

    .dict-input.wide   { width: 220px; }
    .dict-input.result { width: 180px; }
    .dict-input.status { width: 160px; }

    .dict-footer {
      display: flex;
      justify-content: flex-end;
      padding: 6px 24px 10px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Toggle filter bar ──────────────── */

    .filter-bar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .filter-lang {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding-right: 2px;
    }

    .filter-sep {
      width: 1px;
      height: 18px;
      background: var(--border);
      margin: 0 4px;
    }

    .toggle-btn {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 50px;
      padding: 3px 12px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .toggle-btn.on {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .toggle-btn:hover { border-color: var(--accent); }

    .link-btn {
      text-decoration: none;
      color: var(--text-muted);
    }
    .link-btn:hover { color: var(--accent); }

    /* ── iframe card grid ───────────────── */

    .cards-wrap {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-top: 1px solid var(--border);
    }

    .iframe-card {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      min-width: 0;
    }

    .iframe-card.hidden { display: none; }

    .iframe-card-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 6px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .lang-tag {
      font-size: 0.65rem;
      font-weight: 700;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      color: var(--accent-dark);
    }

    .iframe-card iframe {
      width: 100%;
      height: calc(100vh - 260px);
      min-height: 480px;
      border: none;
      display: block;
    }

    .open-card-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      height: 100px;
      padding: 16px 24px;
      text-align: center;
    }

    .open-card-body p {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin: 0;
    }

    .open-card-body .btn {
      font-size: 0.85rem;
    }

    .deepl-result-body {
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .deepl-result-body #deeplResultText {
      font-size: 1.1rem;
      line-height: 1.6;
      color: var(--text);
      min-height: 60px;
    }

    .deepl-status {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .open-card-body .btn[href="#"] {
      opacity: 0.4;
      pointer-events: none;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/">phantom.moe</a>
  <ul class="navbar-links">
    <li><a href="cndict">Dictionary</a></li>
    <li><a href="zhprocessor">ZH Pipeline</a></li>
  </ul>
</nav>

<div class="dict-header">
  <h1>Mandarin Dictionary Aggregator</h1>
  <p class="subtitle">Search across all dictionaries simultaneously. try <strong>快乐</strong></p>

  <div class="dict-rows">
    <div class="dict-row">
      <span class="dict-row-label">Search</span>
      <input class="dict-input wide" type="text" id="searchInputBox" placeholder="Translate from EN or ZH">
      <button class="btn" id="dictionarySearchButton">Search</button>
    </div>
  </div>
</div>

<div class="dict-footer">
  <button class="btn btn-ghost" id="scrollTopButton">Scroll to top</button>
</div>

<div class="tohide-element" id="dictIntro"></div>

<!-- Toggle filter bar -->
<div class="filter-bar">
  <span class="filter-lang">KR</span>
  <button class="toggle-btn on" data-frame="naverFrame">Naver</button>

  <div class="filter-sep"></div>
  <span class="filter-lang">JP</span>
  <button class="toggle-btn on" data-frame="weblioFrame">Weblio</button>

  <div class="filter-sep"></div>
  <span class="filter-lang">EN</span>
  <button class="toggle-btn on" data-frame="deeplCard">DeepL</button>
  <button class="toggle-btn on" data-frame="wikitFrame">Wiktionary</button>
  <div class="filter-sep"></div>
  <a id="forvoLink" href="#" target="_blank" rel="noopener" class="toggle-btn link-btn">Forvo ↗</a>
  <a id="baiduLink" href="#" target="_blank" rel="noopener" class="toggle-btn link-btn">Baidu ↗</a>

  <div class="filter-sep"></div>
  <span class="filter-lang">ZH</span>
  <button class="toggle-btn on" data-frame="hanziFrame">Hanzi</button>
  <a id="baiduDictLink" href="#" target="_blank" rel="noopener" class="toggle-btn link-btn">Baidu Dict ↗</a>
  <a id="zdicLink" href="#" target="_blank" rel="noopener" class="toggle-btn link-btn">Zdic ↗</a>
</div>

<!-- iframe card grid -->
<div class="cards-wrap content">
  <div class="iframe-card" id="card-naverFrame">
    <div class="iframe-card-label"><span class="lang-tag">KR</span> Naver</div>
    <iframe id="naverFrame" src="about:blank" scrolling="yes"></iframe>
  </div>
  <div class="iframe-card" id="card-weblioFrame">
    <div class="iframe-card-label"><span class="lang-tag">JP</span> Weblio</div>
    <iframe id="weblioFrame" src="about:blank" scrolling="yes"></iframe>
  </div>
  <div class="iframe-card" id="card-deeplCard">
    <div class="iframe-card-label"><span class="lang-tag">EN</span> DeepL</div>
    <div class="deepl-result-body">
      <div id="deeplResultText"></div>
      <div id="deeplStatus" class="deepl-status"></div>
    </div>
  </div>
  <div class="iframe-card" id="card-wikitFrame">
    <div class="iframe-card-label"><span class="lang-tag">EN</span> Wiktionary</div>
    <iframe id="wikitFrame" src="about:blank" scrolling="yes"></iframe>
  </div>
  <div class="iframe-card" id="card-hanziFrame">
    <div class="iframe-card-label"><span class="lang-tag">ZH</span> Hanzi</div>
    <iframe id="hanziFrame" src="about:blank" scrolling="yes"></iframe>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="./cndictscript.js"></script>
</body>
</html>
