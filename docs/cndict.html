<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mandarin Dictionary Aggregator — Phantom Tools</title>
  <meta content="Mandarin Dictionary Aggregator" property="og:title">
  <meta content="Search across multiple dictionaries simultaneously" property="og:description">
  <link rel="stylesheet" href="./cndictstyle.css">
  <link rel="icon" href="./assets/elysigicon.png" type="image/png">
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/">phantom.moe</a>
  <ul class="navbar-links">
    <li><a href="cndict">Dictionary</a></li>
    <li><a href="zhprocessor">ZH Pipeline</a></li>
  </ul>
</nav>

<div class="dict-header">
  <h1>Mandarin Dictionary Aggregator</h1>
  <p>Search across all dictionaries simultaneously — try <strong>快乐</strong></p>

  <div class="dict-controls">
    <input class="dict-input" type="text" id="searchInputBox" placeholder="Search term (Mandarin)">
    <button class="btn" id="dictionarySearchButton" onclick="searchWebsites()">Search</button>

    <div class="dict-divider"></div>

    <input class="dict-input" type="text" id="translateInputBox" placeholder="English to translate">
    <button class="btn" id="translateButton" onclick="translateWebsites()">Translate</button>
    <input class="dict-input" type="text" id="translateDeeplBox" placeholder="DeepL result" readonly>
    <input class="dict-input" type="text" id="deeplBoxStatus" placeholder="API initializing..." readonly>

    <div class="dict-divider"></div>

    <button class="btn btn-ghost" onclick="scrollToTop()">Scroll To Top</button>
  </div>
</div>

<div class="tohide-element" id="dictIntro">
  <!-- auto-hidden after 3s by JS -->
</div>

<div class="content iframe-container">
  <iframe id="naverFrame" width="28%" src="about:blank" scrolling="yes"></iframe>
  <iframe id="weblioFrame" width="41%" src="about:blank" scrolling="yes"></iframe>
  <iframe id="wikitFrame" width="30%" src="about:blank" scrolling="yes"></iframe>
</div>
<div class="iframe-container">
  <iframe id="forvoFrame" width="12%" src="about:blank" scrolling="yes"></iframe>
  <iframe id="papagoFrame" width="33%" src="about:blank" scrolling="yes"></iframe>
  <iframe id="baiduFrame" width="54%" src="about:blank" scrolling="yes"></iframe>
</div>
<div class="iframe-container">
  <iframe id="deeplFrame" width="40%" src="about:blank" scrolling="yes"></iframe>
  <iframe id="hanziFrame" width="40%" src="about:blank" scrolling="yes"></iframe>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="./cndictscript.js"></script>
</body>
</html>
